<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensei de Karate-do (IA Grandmaster)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            max-width: 700px;
            height: 85vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: transparent;
        }
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .message-bubble {
            max-width: 80%;
            padding: 0.875rem 1.25rem;
            border-radius: 1.25rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }
        .sensei-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        .input-area {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 0.75rem;
        }
        .input-area input {
            flex-grow: 1;
            padding: 0.875rem 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 2rem;
            margin-left: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.875rem 1.25rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 1.25rem;
            border-bottom-left-radius: 0.25rem;
            color: white;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        /* 🎨 Estilos críticos para que el Markdown no se vea separado */
        .sensei-message p {
            margin: 0; /* CERO ABSOLUTO */
            color: white; 
            line-height: 1.3; /* Máxima densidad */
        }

        .sensei-message p:last-child {
            margin-bottom: 0; /* Elimina el espacio al final del mensaje */
        }

        .sensei-message ul, .sensei-message ol {
            margin: 0; /* CERO ABSOLUTO en listas */
            padding-left: 1.25rem;
            color: white; 
        }

        .sensei-message li {
            margin: 0; /* CERO ABSOLUTO entre items */
            color: white; 
        }

        /* Ajuste de títulos para que no ocupen media pantalla */
        .sensei-message h1, .sensei-message h2, .sensei-message h3 {
            margin: 0.2rem 0; /* Mínimo existente */
            font-weight: bold;
            display: block;
            color: white; 
        }
        
        .sensei-message h1 { 
            font-size: 1.5rem; 
        }
        .sensei-message h2 { 
            font-size: 1.25rem; 
        }
        .sensei-message h3 { 
            font-size: 1.125rem; 
        }
        .sensei-message h4 { 
            font-size: 1rem; 
            margin: 0.2rem 0; /* Consistente con otros títulos */
            color: white; 
        }
        .sensei-message strong { 
            font-weight: 700; 
            color: #fde047; 
        }
        .sensei-message em { 
            font-style: italic; 
            color: #bfdbfe; 
        }
        .sensei-message code { 
            background-color: #1f2937; 
            padding: 0.125rem 0.25rem; 
            border-radius: 0.25rem; 
            color: #86efac; 
            font-size: 0.875rem; 
        }
        .sensei-message blockquote { 
            border-left: 4px solid #facc15; 
            padding-left: 1rem; 
            font-style: italic; 
            color: #e5e7eb; 
            margin: 0.1rem 0; /* Cero casi absoluto */
        }
        .sensei-message hr { 
            border-color: #9ca3af; 
            margin: 0.1rem 0; /* Cero casi absoluto */
        }
        .sensei-message a { 
            color: #93c5fd; 
            text-decoration: underline; 
        }
        .sensei-message a:hover { 
            color: #bfdbfe; 
        }
        
        /* 🎨 Estilos específicos para emojis y karate terminology */
        .sensei-message .emoji-highlight {
            font-size: 1.5rem; 
            margin-right: 0.25rem; 
        }
        .sensei-message .technique-name {
            font-weight: 700; 
            color: #fde047; 
        }
        .sensei-message .category-tag {
            display: inline-block; 
            background-color: #9333ea; 
            padding: 0.25rem 0.5rem; 
            border-radius: 0.25rem; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-right: 0.25rem; 
        }
        .sensei-message .belt-level {
            display: inline-block; 
            background-color: #16a34a; 
            padding: 0.25rem 0.5rem; 
            border-radius: 0.25rem; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-right: 0.25rem; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="chat-container">
        <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-6 text-center font-bold text-xl rounded-t-2xl shadow-lg">
            <div class="flex items-center justify-center gap-3">
                <span class="text-2xl">🥋</span>
                <span>Sensei AI Grandmaster (Nivel Expert)</span>
                <span class="text-2xl">🥋</span>
            </div>
            <p class="text-sm text-gray-300 mt-2">Shindo Jinen Ryu - Motor con Detección de Intención</p>
        </header>
        <div class="messages" id="messages">
            <!-- Los mensajes del chat aparecerán aquí -->
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta técnica al Sensei..." maxlength="500">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <!-- MOTOR UNIFICADO SENSEI AI -->
    <script>
        // 🧠 MOTOR GRANDMASTER UNIFICADO
        class SenseiAI {
            constructor() {
                this.knowledgeBase = null;
                this.isInitialized = false;
                this.initialize();
            }

            async initialize() {
                try {
                    const response = await fetch('./data/knowledge_base.json');
                    this.knowledgeBase = await response.json();
                    this.isInitialized = true;
                    console.log('✅ Sensei AI Grandmaster inicializado');
                    console.log('📚 Técnicas cargadas:', Object.keys(this.knowledgeBase.techniqueDetails || {}).length);
                } catch (error) {
                    console.error('❌ Error al cargar la base de conocimiento:', error);
                    this.showError('No pude cargar la base de conocimiento. Recarga la página.');
                }
            }

            // 🔍 DETECCIÓN DE INTENCIÓN CONCEPTUAL AVANZADA
            detectIntent(query) {
                const normalizedQuery = this.normalizeText(query);
                
                const intentPatterns = {
                    biomechanics: ['biomecanica', 'control', 'puntos', 'movimiento', 'como se hace', 'tecnica perfecta', 'ejecucion', 'mecanica', 'postura', 'posicion', 'cuerpo', 'posicionamiento'],
                    breathing: ['respirar', 'respiracion', 'kokyu', 'aire', 'exhalar', 'inhalar', 'respira', 'aliento', 'respiracion', 'respiratorio'],
                    kime: ['kime', 'contraccion', 'tension', 'fuerza', 'potencia', 'explosion', 'enfoque', 'impacto', 'concentracion'],
                    mistakes: ['errores', 'error', 'mal', 'incorrecto', 'falla', 'problema', 'equivocado', 'defecto', 'fallas', 'errores comunes'],
                    katas: ['kata', 'katas', 'practicar', 'donde practico', 'secuencia', 'forma', 'rutina', 'secuencia', 'patrones'],
                    followups: ['sigue', 'despues', 'combo', 'combinacion', 'encadenamiento', 'continuacion', 'siguiente', 'combinaciones'],
                    bunkai: ['aplicacion', 'real', 'combate', 'cuando uso', 'sirve para', 'defensa', 'ataque', 'aplicaciones', 'defensa personal'],
                    prerequisites: ['requiere', 'necesito', 'antes de', 'prerrequisito', 'previo', 'necesario', 'fundamentos', 'base'],
                    targets: ['golpea', 'impacto', 'target', 'donde golpea', 'anatomia', 'kyusho', 'objetivo', 'blanco', 'puntos vitales'],
                    striking: ['golpear', 'ataque', 'puño', 'pegar', 'golpe', 'impacto', 'atacar', 'golpear con']
                };
                
                for (const [intent, keywords] of Object.entries(intentPatterns)) {
                    if (keywords.some(keyword => normalizedQuery.includes(keyword))) {
                        return intent;
                    }
                }
                
                return null;
            }

            // 🔍 BÚSQUEDA CONCEPTUAL AVANZADA CON FALLBACK INTELIGENTE
            search(query) {
                if (!query || !this.isInitialized) return null;
                
                const normalizedQuery = this.normalizeText(query);
                const intent = this.detectIntent(query);
                
                // 🧹 LIMPIEZA DE STOP WORDS Y EXTRACCIÓN DE PALABRAS CLAVE
                const stopWords = ['como', 'se', 'en', 'el', 'un', 'una', 'los', 'las', 'de', 'del', 'para', 'por', 'con', 'sin', 'sobre', 'entre', 'hacia', 'hasta', 'que', 'cual', 'cuales', 'cuando', 'donde', 'porque', 'para', 'a', 'o', 'y', 'pero', 'mas', 'ni', 'si', 'no', 'es', 'son', 'fue', 'fueron', 'ser', 'estar', 'han', 'ha', 'haber', 'habia', 'habian', 'mi', 'tu', 'su', 'nuestro', 'vuestro', 'este', 'esta', 'este', 'estos', 'estas', 'aquel', 'aquella', 'aquellos', 'aquellas', 'la', 'lo', 'le', 'les', 'me', 'te'];
                
                const queryWords = normalizedQuery.split(' ').filter(word => word && !stopWords.includes(word));
                const cleanQuery = queryWords.join(' ');
                
                console.log('🔍 Búsqueda Conceptual:', { original: query, clean: cleanQuery, intent, keywords: queryWords });
                
                let bestMatch = null;
                let bestScore = 0;

                // 🎯 BÚSQUEDA POR PALABRAS CLAVE PRIORITARIA
                for (const [name, technique] of Object.entries(this.knowledgeBase.techniqueDetails || {})) {
                    const normalizedName = this.normalizeText(name);
                    
                    // 🔥 DETECCIÓN DIRECTA DE PALABRAS CLAVE
                    let keywordScore = 0;
                    let matchedKeywords = [];
                    
                    for (const word of queryWords) {
                        if (normalizedName.includes(word)) {
                            keywordScore += 2; // Prioridad alta para palabras clave
                            matchedKeywords.push(word);
                        }
                    }
                    
                    // 📊 SIMILITUD COMPLETA COMO RESPALDO
                    const fullSimilarity = this.fuzzyMatch(cleanQuery, normalizedName);
                    
                    // 🎯 COMBINACIÓN DE ESTRATEGIAS
                    const combinedScore = keywordScore > 0 ? Math.max(keywordScore, fullSimilarity) : fullSimilarity;
                    
                    // 📉 UMBRAL REDUCIDO PARA PALABRAS CLAVE
                    const threshold = keywordScore > 0 ? 0.5 : 0.7;
                    
                    if (combinedScore > bestScore && combinedScore > threshold) {
                        bestScore = combinedScore;
                        bestMatch = {
                            type: intent ? 'technique_with_intent' : 'technique',
                            name: name,
                            technique: technique,
                            matchType: combinedScore === 1.0 ? 'exact' : 'fuzzy',
                            searchSource: 'techniqueDetails',
                            intent: intent,
                            matchedKeywords: matchedKeywords,
                            confidence: combinedScore
                        };
                    }
                }

                // 🔍 BÚSQUEDA SECUNDARIA EN techniquesByRank
                if (!bestMatch) {
                    for (const [rank, categories] of Object.entries(this.knowledgeBase.techniquesByRank || {})) {
                        for (const [category, techniques] of Object.entries(categories)) {
                            for (const technique of techniques) {
                                const normalizedName = this.normalizeText(technique);
                                
                                let keywordScore = 0;
                                let matchedKeywords = [];
                                
                                for (const word of queryWords) {
                                    if (normalizedName.includes(word)) {
                                        keywordScore += 2;
                                        matchedKeywords.push(word);
                                    }
                                }
                                
                                const fullSimilarity = this.fuzzyMatch(cleanQuery, normalizedName);
                                const combinedScore = keywordScore > 0 ? Math.max(keywordScore, fullSimilarity) : fullSimilarity;
                                const threshold = keywordScore > 0 ? 0.5 : 0.7;
                                
                                if (combinedScore > bestScore && combinedScore > threshold) {
                                    bestScore = combinedScore;
                                    bestMatch = {
                                        type: 'technique',
                                        name: technique,
                                        technique: {
                                            descripcion: `Técnica de ${category} del nivel ${rank}`,
                                            uso: 'Consulta detallada no disponible',
                                            cinturon: rank,
                                            category: category,
                                            keywords: [],
                                            incomplete: true
                                        },
                                        matchType: combinedScore === 1.0 ? 'exact' : 'fuzzy',
                                        searchSource: 'techniquesByRank',
                                        intent: intent,
                                        matchedKeywords: matchedKeywords,
                                        confidence: combinedScore
                                    };
                                }
                            }
                        }
                    }
                }

                // 📚 BÚSQUEDA EN VOCABULARIO
                if (!bestMatch) {
                    for (const [term, definition] of Object.entries(this.knowledgeBase.vocabulary || {})) {
                        const normalizedTerm = this.normalizeText(term);
                        
                        let keywordScore = 0;
                        let matchedKeywords = [];
                        
                        for (const word of queryWords) {
                            if (normalizedTerm.includes(word)) {
                                keywordScore += 2;
                                matchedKeywords.push(word);
                            }
                        }
                        
                        const fullSimilarity = this.fuzzyMatch(cleanQuery, normalizedTerm);
                        const combinedScore = keywordScore > 0 ? Math.max(keywordScore, fullSimilarity) : fullSimilarity;
                        const threshold = keywordScore > 0 ? 0.5 : 0.7;
                        
                        if (combinedScore > bestScore && combinedScore > threshold) {
                            bestScore = combinedScore;
                            bestMatch = {
                                type: 'vocabulary',
                                term: term,
                                definition: definition,
                                matchType: combinedScore === 1.0 ? 'exact' : 'fuzzy',
                                searchSource: 'vocabulary',
                                intent: intent,
                                matchedKeywords: matchedKeywords,
                                confidence: combinedScore
                            };
                        }
                    }
                }

                // 🧠 FALLBACK INTELIGENTE PARA INTENCIONES CONCEPTUALES
                if (!bestMatch && intent) {
                    console.log('🧠 Activando fallback conceptual para intent:', intent);
                    const conceptualResponse = this.createConceptualResponse(intent, queryWords);
                    if (conceptualResponse) {
                        return conceptualResponse;
                    }
                }

                // 📊 LOGGING PARA DEBUGGING
                if (bestMatch) {
                    console.log('✅ Match encontrado:', {
                        name: bestMatch.name,
                        confidence: bestMatch.confidence,
                        keywords: bestMatch.matchedKeywords,
                        intent: bestMatch.intent
                    });
                } else {
                    console.log('❌ No se encontró coincidencia para:', queryWords);
                }

                return bestMatch;
            }

            // 🧠 RESPUESTA CONCEPTUAL INTELIGENTE
            createConceptualResponse(intent, queryWords) {
                console.log('🧠 Creando respuesta conceptual para:', intent, queryWords);
                
                switch (intent) {
                    case 'breathing':
                        return this.createBreathingConceptualResponse();
                    case 'striking':
                        return this.createStrikingConceptualResponse();
                    case 'biomechanics':
                        return this.createBiomechanicsConceptualResponse();
                    case 'kime':
                        return this.createKimeConceptualResponse();
                    case 'mistakes':
                        return this.createMistakesConceptualResponse();
                    case 'targets':
                        return this.createTargetsConceptualResponse();
                    case 'katas':
                        return this.createKatasConceptualResponse();
                    case 'bunkai':
                        return this.createBunkaiConceptualResponse();
                    case 'prerequisites':
                        return this.createPrerequisitesConceptualResponse();
                    case 'followups':
                        return this.createFollowupsConceptualResponse();
                    default:
                        return null;
                }
            }

            // 🌬️ RESPUESTA CONCEPTUAL DE RESPIRACIÓN
            createBreathingConceptualResponse() {
                const techniques = Object.entries(this.knowledgeBase.techniqueDetails || {});
                const breathingExamples = [];
                
                for (const [name, technique] of techniques) {
                    if (technique.kokyu_and_kime && technique.kokyu_and_kime.breathing) {
                        breathingExamples.push({
                            name,
                            breathing: technique.kokyu_and_kime.breathing,
                            kime: technique.kokyu_and_kime.kime
                        });
                    }
                }
                
                if (breathingExamples.length === 0) return null;
                
                const response = {
                    type: 'conceptual_breathing',
                    content: `🌬️ **Respiración en Karate-do (Kokyu)**

La respiración es fundamental en el karate. En las técnicas principales:

${breathingExamples.slice(0, 3).map((example, index) => 
    `**${index + 1}. ${example.name}:**
💨 ${example.breathing}${example.kime ? `\n💥 ${example.kime}` : ''}`
).join('\n\n')}

🎯 **Principios Generales del Kokyu:**
- Inhala durante la preparación o desplazamiento
- Exhala bruscamente en el momento del impacto
- El Kime (foco) ocurre simultáneamente con la exhalación
- La respiración sincronizada genera máxima potencia

¿Quieres conocer la respiración de alguna técnica específica?`,
                    intent: 'breathing',
                    examples: breathingExamples.slice(0, 3)
                };
                
                return response;
            }

            // 👊 RESPUESTA CONCEPTUAL DE GOLPEO
            createStrikingConceptualResponse() {
                const techniques = Object.entries(this.knowledgeBase.techniqueDetails || {});
                const strikingTechniques = techniques.filter(([name, technique]) => 
                    technique.category === 'teWaza'
                );
                
                if (strikingTechniques.length === 0) return null;
                
                const response = {
                    type: 'conceptual_striking',
                    content: `👊 **Técnicas de Golpeo (Te Waza)**

Las técnicas de puño son la base del karate. Las principales:

${strikingTechniques.slice(0, 4).map(([name, technique], index) => 
    `**${index + 1}. ${name}:**
📝 ${technique.descripcion}
🎯 ${technique.uso}
🥋 ${technique.cinturon}`
).join('\n\n')}

🎯 **Principios del Golpeo Efectivo:**
- Usa la rotación de cadera para generar potencia
- Mantén el codo relajado hasta el impacto
- El puño (Seiken) es el arma principal
- El Hikite (mano de apoyo) aumenta la fuerza

¿Quieres profundizar en alguna técnica específica?`,
                    intent: 'striking',
                    examples: strikingTechniques.slice(0, 4).map(([name]) => name)
                };
                
                return response;
            }

            // 🎯 RESPUESTA CONCEPTUAL DE BIOMECÁNICA
            createBiomechanicsConceptualResponse() {
                const techniques = Object.entries(this.knowledgeBase.techniqueDetails || {});
                const biomechanicsExamples = [];
                
                for (const [name, technique] of techniques) {
                    if (technique.biomechanics) {
                        biomechanicsExamples.push({
                            name,
                            biomechanics: technique.biomechanics
                        });
                    }
                }
                
                if (biomechanicsExamples.length === 0) return null;
                
                const response = {
                    type: 'conceptual_biomechanics',
                    content: `🎯 **Biomecánica en Karate-do**

La biomecánica optimiza cada movimiento para máxima eficiencia:

${biomechanicsExamples.slice(0, 3).map((example, index) => 
    `**${index + 1}. ${example.name}:**
${example.biomechanics.controlPoints ? 
    `📍 **Puntos Clave:**\n${example.biomechanics.controlPoints.slice(0, 2).map((point, i) => `   ${i + 1}. ${point}`).join('\n')}` : 
    ''}
${example.biomechanics.forceVector ? `\n⚡ **Vector:** ${example.biomechanics.forceVector}` : ''}
${example.biomechanics.stance_dependency ? `\n🥋 **Postura:** ${example.biomechanics.stance_dependency}` : ''}`
).join('\n\n')}

🎯 **Principios Biomecánicos:**
- El cuerpo funciona como unidad integrada
- La cadera es el centro de generación de potencia
- La estructura ósea proporciona soporte
- Los músculos trabajan en cadenas cinéticas

¿Quieres analizar la biomecánica de alguna técnica específica?`,
                    intent: 'biomechanics',
                    examples: biomechanicsExamples.slice(0, 3).map(ex => ex.name)
                };
                
                return response;
            }

            // 💥 RESPUESTA CONCEPTUAL DE KIME
            createKimeConceptualResponse() {
                const techniques = Object.entries(this.knowledgeBase.techniqueDetails || {});
                const kimeExamples = [];
                
                for (const [name, technique] of techniques) {
                    if (technique.kokyu_and_kime && technique.kokyu_and_kime.kime) {
                        kimeExamples.push({
                            name,
                            kime: technique.kokyu_and_kime.kime
                        });
                    }
                }
                
                if (kimeExamples.length === 0) return null;
                
                const response = {
                    type: 'conceptual_kime',
                    content: `💥 **Kime - El Foco y la Potencia**

Kime es la concentración máxima en el punto de impacto:

${kimeExamples.slice(0, 3).map((example, index) => 
    `**${index + 1}. ${example.name}:**
💥 ${example.kime}`
).join('\n\n')}

🎯 **Principios del Kime:**
- Contracción simultánea de músculos clave
- Ocurre en el milisegundo exacto del impacto
- Combina fuerza física y concentración mental
- Se sincroniza con la exhalación completa

¿Quieres conocer el Kime de alguna técnica específica?`,
                    intent: 'kime',
                    examples: kimeExamples.slice(0, 3).map(ex => ex.name)
                };
                
                return response;

            // ⚠️ RESPUESTA CONCEPTUAL DE ERRORES

🤔 **Análisis de la Búsqueda:**

💡 **Sugerencias:**

- Revisa la ortografía: "Uchi Uke" (no "Uchiuke")

📚 **Técnicas Disponibles:**

- **Ashi Waza** (patadas): Mae Geri, Yoko Geri, Mawashi Geri
- **Fusegui Waza** (bloqueos): Uchi Uke, Soto Uke, Gedan Barai`;
                }

**🔍 Fuente:** ${result.searchSource}`;

            // 🔧 UTILIDADES
            normalizeText(text) {
                return text.toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^\w\s]/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            fuzzyMatch(str1, str2) {
                const longer = str1.length > str2.length ? str1 : str2;
                const shorter = str1.length > str2.length ? str2 : str1;
                
                if (longer.length === 0) return 1.0;
                
                const editDistance = this.levenshteinDistance(longer, shorter);
                return (longer.length - editDistance) / longer.length;
            }

            levenshteinDistance(str1, str2) {
                const matrix = [];
                
                for (let i = 0; i <= str2.length; i++) {
                    matrix[i] = [i];
                }
                
                for (let j = 0; j <= str1.length; j++) {
                    matrix[0][j] = j;
                }
                
                for (let i = 1; i <= str2.length; i++) {
                    for (let j = 1; j <= str1.length; j++) {
                        if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
                            matrix[i][j] = matrix[i - 1][j - 1];
                        } else {
                            matrix[i][j] = Math.min(
                                matrix[i - 1][j - 1] + 1,
                                matrix[i][j - 1] + 1,
                                matrix[i - 1][j] + 1
                            );
                        }
                    }
                }
                
                return matrix[str2.length][str1.length];
            }

                const result = this.search(message);
