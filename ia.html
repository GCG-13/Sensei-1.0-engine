<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensei de Karate-do (IA Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            max-width: 700px;
            height: 85vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: transparent;
        }
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .message-bubble {
            max-width: 75%;
            padding: 0.875rem 1.25rem;
            border-radius: 1.25rem;
            line-height: 1.6;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .sensei-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .input-area {
            display: flex;
            padding: 1.25rem;
            background: rgba(249, 250, 251, 0.9);
            border-top: 1px solid rgba(229, 231, 235, 0.5);
            backdrop-filter: blur(10px);
        }
        .input-area input {
            flex-grow: 1;
            border: 2px solid rgba(209, 213, 219, 0.5);
            border-radius: 2rem;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 2rem;
            margin-left: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.875rem 1.25rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 1.25rem;
            border-bottom-left-radius: 0.25rem;
            color: white;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>

        /**
         * Utilidades de Procesamiento de Lenguaje Natural
         * Maneja normalización, validación y fuzzy matching
         */
        class NLPUtils {
            /**
             * Normaliza el texto eliminando acentos y convirtiendo a minúsculas
             * @param {string} text - Texto a normalizar
             * @returns {string} Texto normalizado
             */
            static normalizeText(text) {
                if (typeof text !== 'string') return '';
                return text.normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toLowerCase()
                    .trim();
            }

            /**
             * Valida y sanitiza la entrada del usuario
             * @param {string} input - Entrada del usuario
             * @returns {string} Entrada sanitizada
             */
            static sanitizeInput(input) {
                if (!input || typeof input !== 'string') return '';
                
                // Eliminar caracteres potencialmente peligrosos
                const sanitized = input
                    .replace(/[<>]/g, '')
                    .replace(/[\x00-\x1F\x7F]/g, '')
                    .trim();
                
                // Limitar longitud
                return sanitized.length > 500 ? sanitized.substring(0, 500) : sanitized;
            }

            /**
             * Calcula la similitud entre dos textos usando algoritmo de distancia de Levenshtein
             * @param {string} str1 - Primera cadena
             * @param {string} str2 - Segunda cadena
             * @returns {number} Similitud (0-1)
             */
            static fuzzyMatch(str1, str2) {
                const normalized1 = this.normalizeText(str1);
                const normalized2 = this.normalizeText(str2);
                
                const distance = this.levenshteinDistance(normalized1, normalized2);
                const maxLength = Math.max(normalized1.length, normalized2.length);
                
                return maxLength === 0 ? 1 : 1 - (distance / maxLength);
            }

            /**
             * Calcula la distancia de Levenshtein entre dos cadenas
             * @param {string} str1 - Primera cadena
             * @param {string} str2 - Segunda cadena
             * @returns {number} Distancia de Levenshtein
             */
            static levenshteinDistance(str1, str2) {
                const matrix = Array(str2.length + 1).fill(null).map(() => 
                    Array(str1.length + 1).fill(null));
                
                for (let i = 0; i <= str1.length; i++) matrix[0][i] = i;
                for (let j = 0; j <= str2.length; j++) matrix[j][0] = j;
                
                for (let j = 1; j <= str2.length; j++) {
                    for (let i = 1; i <= str1.length; i++) {
                        const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
                        matrix[j][i] = Math.min(
                            matrix[j][i - 1] + 1,
                            matrix[j - 1][i] + 1,
                            matrix[j - 1][i - 1] + indicator
                        );
                    }
                }
                
                return matrix[str2.length][str1.length];
            }

            /**
             * Extrae palabras clave de una consulta
             * @param {string} query - Consulta del usuario
             * @returns {string[]} Array de palabras clave
             */
            static extractKeywords(query) {
                const normalized = this.normalizeText(query);
                const stopWords = ['el', 'la', 'los', 'las', 'de', 'en', 'que', 'es', 'un', 'una', 'como', 'para', 'con', 'por', 'son', 'mi', 'tu', 'su', 'nuestro', 'nuestra'];
                
                return normalized
                    .split(/\s+/)
                    .filter(word => word.length > 2 && !stopWords.includes(word))
                    .filter((word, index, self) => self.indexOf(word) === index);
            }
        }

        /**
         * Motor de Conocimiento con Sistema de Puntuación
         * Implementa búsqueda avanzada con scoring y pesos
         */
        class KnowledgeEngine {
            constructor(knowledgeBase) {
                this.knowledgeBase = knowledgeBase;
                this.weights = {
                    exact_match: 1.0,
                    keyword_match: 0.8,
                    fuzzy_match: 0.6,
                    partial_match: 0.4,
                    category_boost: 0.3
                };
            }

            /**
             * Busca la mejor respuesta basada en scoring de relevancia
             * @param {string} query - Consulta del usuario
             * @returns {Object|null} Mejor resultado encontrado
             */
            search(query) {
                const normalizedQuery = NLPUtils.normalizeText(query);
                const keywords = NLPUtils.extractKeywords(query);
                const results = [];

                // Búsqueda en técnicas detalladas (prioridad alta)
                results.push(...this.searchTechniques(normalizedQuery, keywords));
                
                // Búsqueda en FAQs y vocabulario
                results.push(...this.searchGeneral(normalizedQuery, keywords));
                
                // Búsqueda por rangos de cinturón
                results.push(...this.searchByRank(normalizedQuery));
                
                // Búsqueda en partes del cuerpo
                results.push(...this.searchBodyParts(normalizedQuery, keywords));

                // Ordenar por score y devolver el mejor resultado
                results.sort((a, b) => b.score - a.score);
                
                return results.length > 0 ? results[0] : null;
            }

            /**
             * Busca en las secciones de técnicas detalladas
             * @param {string} query - Consulta normalizada
             * @param {string[]} keywords - Palabras clave extraídas
             * @returns {Array} Resultados de búsqueda
             */
            searchTechniques(query, keywords) {
                const sections = ['teWazaDetails', 'fuseguiWazaDetails', 'ashiWazaDetails', 'atemiWazaDetails'];
                const results = [];

                sections.forEach(section => {
                    const details = this.knowledgeBase[section];
                    if (!details) return;

                    Object.entries(details).forEach(([key, item]) => {
                        let score = 0;
                        let matchType = '';

                        // Búsqueda exacta en nombre español
                        if (item.itemSpanishName) {
                            const normalized = NLPUtils.normalizeText(item.itemSpanishName);
                            if (normalized === query) {
                                score = this.weights.exact_match;
                                matchType = 'exact';
                            } else if (normalized.includes(query) || query.includes(normalized)) {
                                score = this.weights.partial_match;
                                matchType = 'partial';
                            } else {
                                const fuzzyScore = NLPUtils.fuzzyMatch(query, normalized);
                                if (fuzzyScore > 0.7) {
                                    score = this.weights.fuzzy_match * fuzzyScore;
                                    matchType = 'fuzzy';
                                }
                            }
                        }

                        // Búsqueda por palabras clave en descripción y uso
                        keywords.forEach(keyword => {
                            if (item.descripcion && NLPUtils.normalizeText(item.descripcion).includes(keyword)) {
                                score += this.weights.keyword_match * 0.5;
                            }
                            if (item.uso && NLPUtils.normalizeText(item.uso).includes(keyword)) {
                                score += this.weights.keyword_match * 0.3;
                            }
                        });

                        if (score > 0) {
                            results.push({
                                type: 'technique',
                                section,
                                key,
                                item,
                                score: score + this.weights.category_boost,
                                matchType
                            });
                        }
                    });
                });

                return results;
            }

            /**
             * Busca en secciones generales (FAQs, vocabulario, etc.)
             * @param {string} query - Consulta normalizada
             * @param {string[]} keywords - Palabras clave
             * @returns {Array} Resultados de búsqueda
             */
            searchGeneral(query, keywords) {
                const sections = ['faq', 'organization', 'history', 'vocabulary'];
                const results = [];

                sections.forEach(section => {
                    const data = this.knowledgeBase[section];
                    if (!data) return;

                    Object.entries(data).forEach(([key, value]) => {
                        let score = 0;

                        // Búsqueda en clave
                        const normalizedKey = NLPUtils.normalizeText(key);
                        if (normalizedKey === query) {
                            score = this.weights.exact_match;
                        } else if (normalizedKey.includes(query) || query.includes(normalizedKey)) {
                            score = this.weights.partial_match;
                        } else {
                            const fuzzyScore = NLPUtils.fuzzyMatch(query, normalizedKey);
                            if (fuzzyScore > 0.7) {
                                score = this.weights.fuzzy_match * fuzzyScore;
                            }
                        }

                        // Búsqueda en valor
                        const normalizedValue = NLPUtils.normalizeText(value);
                        keywords.forEach(keyword => {
                            if (normalizedValue.includes(keyword)) {
                                score += this.weights.keyword_match * 0.5;
                            }
                        });

                        if (score > 0) {
                            results.push({
                                type: 'general',
                                section,
                                key,
                                value,
                                score
                            });
                        }
                    });
                });

                return results;
            }

            /**
             * Busca por rangos de cinturón
             * @param {string} query - Consulta normalizada
             * @returns {Array} Resultados de búsqueda
             */
            searchByRank(query) {
                const results = [];
                const kyuMatch = query.match(/(\d+)\s*kyu/);
                const danMatch = query.match(/(\d+)\s*dan/);

                if (kyuMatch || danMatch) {
                    const rank = kyuMatch ? `${kyuMatch[1]} kyu` : `${danMatch[1]} dan`;
                    const techniques = this.knowledgeBase.techniquesByRank[rank];

                    if (techniques) {
                        results.push({
                            type: 'rank',
                            rank,
                            techniques,
                            score: this.weights.exact_match + this.weights.category_boost
                        });
                    }
                }

                return results;
            }

            /**
             * Busca información sobre partes del cuerpo
             * @param {string} query - Consulta normalizada
             * @param {string[]} keywords - Palabras clave
             * @returns {Array} Resultados de búsqueda
             */
            searchBodyParts(query, keywords) {
                const results = [];
                const bodyParts = this.knowledgeBase.bodyParts;

                // Búsqueda por categorías
                if (query.includes('partes del pie') || query.includes('pie')) {
                    results.push({
                        type: 'body_parts_category',
                        category: 'foot',
                        data: bodyParts.foot,
                        score: this.weights.exact_match
                    });
                }

                if (query.includes('partes de la mano') || query.includes('mano')) {
                    results.push({
                        type: 'body_parts_category',
                        category: 'hand',
                        data: bodyParts.hand,
                        score: this.weights.exact_match
                    });
                }

                if (query.includes('partes del cuerpo') || query.includes('cuerpo')) {
                    results.push({
                        type: 'body_parts_category',
                        category: 'general',
                        data: bodyParts.general,
                        score: this.weights.exact_match
                    });
                }

                // Búsqueda individual de partes del cuerpo
                ['general', 'hand', 'foot'].forEach(category => {
                    const categoryData = bodyParts[category];
                    if (!categoryData) return;

                    Object.entries(categoryData).forEach(([key, value]) => {
                        keywords.forEach(keyword => {
                            const normalizedKey = NLPUtils.normalizeText(key);
                            const normalizedValue = NLPUtils.normalizeText(value);
                            
                            if (normalizedKey.includes(keyword) || normalizedValue.includes(keyword)) {
                                results.push({
                                    type: 'body_part',
                                    category,
                                    key,
                                    value,
                                    score: this.weights.keyword_match
                                });
                            }
                        });
                    });
                });

                return results;
            }
        }

        /**
         * Gestor de Interfaz de Usuario del Chat
         * Maneja la presentación y animaciones
         */
        class ChatUI {
            constructor() {
                this.messagesContainer = document.getElementById('messages');
                this.userInput = document.getElementById('userInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.isProcessing = false;
            }

            /**
             * Agrega un mensaje al chat
             * @param {string} sender - Remitente ('user' o 'sensei')
             * @param {string} message - Contenido del mensaje
             */
            appendMessage(sender, message) {
                const messageBubble = document.createElement('div');
                messageBubble.classList.add('message-bubble');
                
                if (sender === 'user') {
                    messageBubble.classList.add('user-message');
                } else {
                    messageBubble.classList.add('sensei-message');
                }

                messageBubble.style.whiteSpace = 'pre-wrap';
                messageBubble.textContent = message;
                
                this.messagesContainer.appendChild(messageBubble);
                this.scrollToBottom();
            }

            /**
             * Muestra indicador de que el Sensei está escribiendo
             * @returns {HTMLElement} Elemento del indicador
             */
            showTypingIndicator() {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = `
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                `;
                
                this.messagesContainer.appendChild(indicator);
                this.scrollToBottom();
                
                return indicator;
            }

            /**
             * Oculta el indicador de escritura
             * @param {HTMLElement} indicator - Elemento del indicador
             */
            hideTypingIndicator(indicator) {
                if (indicator && indicator.parentNode) {
                    indicator.parentNode.removeChild(indicator);
                }
            }

            /**
             * Desplaza el scroll hacia abajo
             */
            scrollToBottom() {
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }

            /**
             * Habilita/deshabilita la interfaz durante el procesamiento
             * @param {boolean} processing - Estado de procesamiento
             */
            setProcessingState(processing) {
                this.isProcessing = processing;
                this.userInput.disabled = processing;
                this.sendBtn.disabled = processing;
                
                if (processing) {
                    this.userInput.placeholder = 'Sensei está pensando...';
                } else {
                    this.userInput.placeholder = 'Escribe tu pregunta al Sensei...';
                    this.userInput.focus();
                }
            }

            /**
             * Obtiene y limpia la entrada del usuario
             * @returns {string} Entrada sanitizada
             */
            getUserInput() {
                const input = this.userInput.value.trim();
                this.userInput.value = '';
                return NLPUtils.sanitizeInput(input);
            }
        }

        /**
         * Sistema Principal del Sensei
         * Orquesta todos los componentes
         */
        class SenseiSystem {
            constructor() {
                this.knowledgeEngine = new KnowledgeEngine(knowledgeBase);
                this.chatUI = new ChatUI();
                this.initializeEventListeners();
                this.startConversation();
            }

            /**
             * Inicializa los event listeners
             */
            initializeEventListeners() {
                this.chatUI.sendBtn.addEventListener('click', () => this.handleUserInput());
                this.chatUI.userInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !this.chatUI.isProcessing) {
                        this.handleUserInput();
                    }
                });
            }

            /**
             * Inicia la conversación con el saludo inicial
             */
            startConversation() {
                setTimeout(() => {
                    this.chatUI.appendMessage('sensei', knowledgeBase.general.greeting);
                }, 500);
            }

            /**
             * Maneja la entrada del usuario
             */
            async handleUserInput() {
                const userMessage = this.chatUI.getUserInput();
                
                if (!userMessage) return;

                // Mostrar mensaje del usuario
                this.chatUI.appendMessage('user', userMessage);

                // Mostrar indicador de escritura
                this.chatUI.setProcessingState(true);
                const typingIndicator = this.chatUI.showTypingIndicator();

                // Simular tiempo de procesamiento
                await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));

                // Generar respuesta
                const response = this.generateResponse(userMessage);

                // Ocultar indicador y mostrar respuesta
                this.chatUI.hideTypingIndicator(typingIndicator);
                this.chatUI.appendMessage('sensei', response);
                this.chatUI.setProcessingState(false);
            }

            /**
             * Genera la respuesta del Sensei
             * @param {string} userMessage - Mensaje del usuario
             * @returns {string} Respuesta generada
             */
            generateResponse(userMessage) {
                const normalizedQuery = NLPUtils.normalizeText(userMessage);

                // 1. Lógica conversacional básica
                if (normalizedQuery.includes('hola') || normalizedQuery.includes('saludo') || normalizedQuery.includes('buenos dias')) {
                    return knowledgeBase.general.greeting;
                }
                
                if (normalizedQuery.includes('adios') || normalizedQuery.includes('despedida') || normalizedQuery.includes('hasta luego')) {
                    return knowledgeBase.general.farewell;
                }

                // 2. Búsqueda en motor de conocimiento
                const searchResult = this.knowledgeEngine.search(userMessage);
                
                if (searchResult) {
                    return this.formatResponse(searchResult);
                }

                // 3. Lógica emocional y motivacional
                if (normalizedQuery.includes('frustrado') || normalizedQuery.includes('no puedo') || normalizedQuery.includes('es dificil')) {
                    return "Osu. El camino del Budo es largo y a veces rocoso. Pero recuerda, la verdadera fuerza no es la que se muestra en un golpe, sino la que te levanta después de una caída. Sigue practicando con dedicación, y el muro que ves hoy será el escalón de mañana.";
                }

                // 4. Lógica creativa
                if (normalizedQuery.includes('poema') || normalizedQuery.includes('romance') || normalizedQuery.includes('metafora')) {
                    if (normalizedQuery.includes('karate') && normalizedQuery.includes('romance')) {
                        return knowledgeBase.logica_creativa.poema_karate_romance;
                    }
                    if (normalizedQuery.includes('progreso')) {
                        return knowledgeBase.logica_creativa.metafora_progreso;
                    }
                }

                // 5. Respuesta por defecto
                return knowledgeBase.general.error;
            }

            /**
             * Formatea la respuesta según el tipo de resultado
             * @param {Object} result - Resultado de la búsqueda
             * @returns {string} Respuesta formateada
             */
            formatResponse(result) {
                switch (result.type) {
                    case 'technique':
                        return this.formatTechniqueResponse(result.item);
                    
                    case 'rank':
                        return this.formatRankResponse(result.rank, result.techniques);
                    
                    case 'body_parts_category':
                        return this.formatBodyPartsCategoryResponse(result.category, result.data);
                    
                    case 'general':
                    case 'body_part':
                        return `¡Osu! ¡Buena pregunta!\n\n${result.value || result.data}`;
                    
                    default:
                        return knowledgeBase.general.error;
                }
            }

            /**
             * Formatea respuesta para técnicas
             * @param {Object} technique - Datos de la técnica
             * @returns {string} Respuesta formateada
             */
            formatTechniqueResponse(technique) {
                let response = `¡Osu! Te refieres a la técnica **${technique.itemSpanishName}**.\n\n`;
                
                if (technique.descripcion) {
                    response += `**Descripción:** ${technique.descripcion}\n`;
                }
                
                if (technique.uso) {
                    response += `**Uso:** ${technique.uso}\n`;
                }
                
                if (technique.cinturon) {
                    response += `**Cinturón de aprendizaje:** ${technique.cinturon}\n`;
                }
                
                return response;
            }

            /**
             * Formatea respuesta para rangos
             * @param {string} rank - Rango de cinturón
             * @param {Object} techniques - Técnicas del rango
             * @returns {string} Respuesta formateada
             */
            formatRankResponse(rank, techniques) {
                let response = `¡Osu! ¡Buena pregunta! Para el **${rank}**, las técnicas que se suelen estudiar son:\n\n`;
                
                if (techniques.teWaza && techniques.teWaza.length > 0) {
                    response += "Técnicas de puño (Te Waza):\n- " + techniques.teWaza.join('\n- ') + '\n\n';
                }
                
                if (techniques.fuseguiWaza && techniques.fuseguiWaza.length > 0) {
                    response += "Técnicas de defensa (Fusegui Waza):\n- " + techniques.fuseguiWaza.join('\n- ') + '\n\n';
                }
                
                if (techniques.ashiWaza && techniques.ashiWaza.length > 0) {
                    response += "Técnicas de patada (Ashi Waza):\n- " + techniques.ashiWaza.join('\n- ') + '\n\n';
                }
                
                return response + "Recuerda que cada técnica requiere práctica constante. Sigue así.";
            }

            /**
             * Formatea respuesta para categorías de partes del cuerpo
             * @param {string} category - Categoría
             * @param {Object} data - Datos de la categoría
             * @returns {string} Respuesta formateada
             */
            formatBodyPartsCategoryResponse(category, data) {
                const categoryNames = {
                    'foot': 'pie',
                    'hand': 'mano',
                    'general': 'cuerpo'
                };
                
                let response = `¡Osu! ¡Buena pregunta! Las partes del ${categoryNames[category]} que usamos en Karate-do son:\n\n`;
                
                Object.entries(data).forEach(([key, value]) => {
                    const [name, description] = value.split(':');
                    response += `- **${name.trim()}**: ${description.trim()}\n`;
                });
                
                return response;
            }
        }

        // Inicializar el sistema cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            new SenseiSystem();
        });
    </script>
</body>
