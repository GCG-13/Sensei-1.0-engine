<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensei IA - Asistente Virtual de Karate-do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            max-width: 700px;
            height: 85vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: transparent;
        }
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .message-bubble {
            max-width: 75%;
            padding: 0.875rem 1.25rem;
            border-radius: 1.25rem;
            line-height: 1.6;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .sensei-message {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 1rem;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        .input-area {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 1rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-area button {
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -1px rgba(0, 0, 0, 0.15);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .header {
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }
        .back-button {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 500;
        }
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .suggestion-chip {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <a href="karate.html" class="back-button">← Volver</a>
    
    <div class="chat-container">
        <header class="header">
            <h1>🥋 Sensei IA</h1>
            <p>Asistente Virtual de Karate-do Shindo Jinen Ryu</p>
        </header>
        
        <div class="messages" id="messages">
            <!-- Mensaje de bienvenida -->
            <div class="message-bubble sensei-message">
                <div>¡Osu! Soy tu Sensei virtual. Estoy aquí para guiarte en el camino del Karate-do.</div>
                <div style="font-size: 0.875rem; margin-top: 0.5rem; opacity: 0.9;">
                    Puedes preguntarme sobre técnicas, vocabulario, historia o cualquier aspecto del Karate-do.
                </div>
                <div class="suggestions">
                    <div class="suggestion-chip" onclick="sendSuggestion('¿Qué es Oi Zuki?')">¿Qué es Oi Zuki?</div>
                    <div class="suggestion-chip" onclick="sendSuggestion('¿Qué significa dojo?')">¿Qué significa dojo?</div>
                    <div class="suggestion-chip" onclick="sendSuggestion('Técnicas básicas')">Técnicas básicas</div>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta al Sensei..." maxlength="500">
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // Sistema de IA simplificado para la PWA
        class SenseiAI {
            constructor() {
                this.knowledgeBase = {
                    general: {
                        greeting: "¡Osu! Soy un Sensei de Shindo Jinen Ryu.",
                        farewell: "¡Osu! El conocimiento es un viaje sin fin.",
                        error: "¡Osu! Mi conocimiento es vasto, pero necesito más claridad.",
                        apology: "Disculpe, Sensei no entendió su pregunta, intente de nuevo."
                    },
                    techniques: {
                        "Oi Zuki": {
                            descripcion: "Golpe de puño directo con la mano adelantada. Es el ataque más fundamental en karate.",
                            uso: "Ataque frontal directo al pecho o abdomen del oponente.",
                            cinturon: "10° Kyu",
                            category: "teWaza"
                        },
                        "Gyaku Zuki": {
                            descripcion: "Golpe de puño con la mano trasera. Genera gran potencia mediante la rotación de cadera.",
                            uso: "Contraataque potente aprovechando la rotación del cuerpo.",
                            cinturon: "10° Kyu",
                            category: "teWaza"
                        },
                        "Mae Geri": {
                            descripcion: "Patada frontal directa con la bola del pie. Es la patada más básica y versátil.",
                            uso: "Ataque frontal al abdomen, pecho o cara del oponente.",
                            cinturon: "10° Kyu",
                            category: "ashiWaza"
                        },
                        "Gedan Barai": {
                            descripcion: "Bloqueo descendente con el antebrazo. Defiende la parte baja del cuerpo.",
                            uso: "Defensa contra patadas bajas y ataques al abdomen.",
                            cinturon: "10° Kyu",
                            category: "fuseguiWaza"
                        },
                        "Sanbon Zuki": {
                            descripcion: "Combinación de tres puñetazos consecutivos: Oi Zuki (Jodan), Gyaku Zuki (Chudan), Gyaku Zuki (Chudan).",
                            uso: "Técnica avanzada de combinación para kumite y katas.",
                            cinturon: "1° Dan",
                            category: "teWaza"
                        },
                        "Mawashi Geri": {
                            descripcion: "Patada circular semicircular con el empeine del pie. Es una de las patadas más efectivas en combate.",
                            uso: "Ataque circular a la cabeza, torso o piernas del oponente.",
                            cinturon: "5° Kyu",
                            category: "ashiWaza"
                        },
                        "Uchi Uke": {
                            descripcion: "Bloqueo interior hacia afuera con el antebrazo. Defiende el torso medio.",
                            uso: "Desviar golpes directos al centro del cuerpo (chudan).",
                            cinturon: "9° Kyu",
                            category: "fuseguiWaza"
                        },
                        "Soto Uke": {
                            descripcion: "Bloqueo exterior hacia adentro con el antebrazo. Defiende ataques laterales.",
                            uso: "Proteger contra golpes desde los costados hacia el centro.",
                            cinturon: "9° Kyu",
                            category: "fuseguiWaza"
                        },
                        "Jodan Uke": {
                            descripcion: "Bloqueo ascendente para defender la parte superior del cuerpo.",
                            uso: "Proteger la cabeza y cara de golpes superiores.",
                            cinturon: "10° Kyu",
                            category: "fuseguiWaza"
                        },
                        "Uraken Uchi": {
                            descripcion: "Golpe rápido con el dorso del puño en movimiento circular.",
                            uso: "Ataque sorpresivo a la cara o sienes del oponente.",
                            cinturon: "9° Kyu",
                            category: "teWaza"
                        },
                        "Yoko Geri Keage": {
                            descripcion: "Patada lateral ascendente de chasquido con el borde del pie.",
                            uso: "Ataque rápido a las costillas o cabeza del oponente.",
                            cinturon: "9° Kyu",
                            category: "ashiWaza"
                        },
                        "Kakato Geri": {
                            descripcion: "Patada descendente con el talón. Requiere gran elevación y potencia.",
                            uso: "Ataque poderoso a la cabeza o clavícula del oponente.",
                            cinturon: "2° Kyu",
                            category: "ashiWaza"
                        },
                        "Nukite": {
                            descripcion: "Ataque con las puntas de los dedos extendidos y juntos.",
                            uso: "Ataque preciso a puntos vitales como ojos, garganta o plexo solar.",
                            cinturon: "6° Kyu",
                            category: "teWaza"
                        },
                        "Manji Uke": {
                            descripcion: "Bloqueo doble cruzado que defiende dos niveles simultáneamente.",
                            uso: "Defensa avanzada contra ataques múltiples o combinados.",
                            cinturon: "2° Kyu",
                            category: "fuseguiWaza"
                        },
                        "Shuto Uchi": {
                            descripcion: "Golpe con el borde exterior de la mano abierta (lado del dedo meñique).",
                            uso: "Ataque al cuello, clavícula o costillas del oponente.",
                            cinturon: "8° Kyu",
                            category: "teWaza"
                        }
                    },
                    vocabulary: {
                        "dojo": "Lugar de entrenamiento de artes marciales. Literalmente 'lugar del camino'.",
                        "sensei": "Maestro o instructor. Literalmente 'el que ha nacido antes'.",
                        "oss": "Expresión de respeto y afirmación en karate. Se usa para saludar, mostrar respeto y confirmar instrucciones.",
                        "kumite": "Combate o sparring en karate. Práctica de combate con oponente.",
                        "kata": "Secuencia formal de movimientos que simulan combate contra múltiples oponentes.",
                        "kihon": "Fundamentos o técnicas básicas del karate.",
                        "karate": "Mano vacía. Arte marcial de origen okinawense."
                    },
                    history: {
                        "shindo jinen ryu": "Estilo fundado por Yasuhiro Konishi en 1933. Combina elementos de Shotokan y otras artes marciales.",
                        "yasuhiro konishi": "Fundador del Shindo Jinen Ryu. Nació en 1893 y fue uno de los pioneros del karate moderno.",
                        "origen": "El karate se originó en Okinawa como método de defensa desarmada contra samuráis invasores."
                    }
                };
            }

            normalizeText(text) {
                return text.toLowerCase()
                    .trim()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '');
            }

            fuzzyMatch(str1, str2) {
                const normalized1 = this.normalizeText(str1);
                const normalized2 = this.normalizeText(str2);
                
                if (normalized1 === normalized2) return 1.0;
                if (normalized1.includes(normalized2) || normalized2.includes(normalized1)) return 0.8;
                
                // Simple Levenshtein distance
                const distance = this.levenshteinDistance(normalized1, normalized2);
                const maxLength = Math.max(normalized1.length, normalized2.length);
                return maxLength === 0 ? 1 : 1 - (distance / maxLength);
            }

            levenshteinDistance(str1, str2) {
                const matrix = Array(str2.length + 1).fill(null).map(() => 
                    Array(str1.length + 1).fill(null));
                
                for (let i = 0; i <= str1.length; i++) matrix[0][i] = i;
                for (let j = 0; j <= str2.length; j++) matrix[j][0] = j;
                
                for (let j = 1; j <= str2.length; j++) {
                    for (let i = 1; i <= str1.length; i++) {
                        const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
                        matrix[j][i] = Math.min(
                            matrix[j][i - 1] + 1,
                            matrix[j - 1][i] + 1,
                            matrix[j - 1][i - 1] + indicator
                        );
                    }
                }
                
                return matrix[str2.length][str1.length];
            }

            search(query) {
                const normalizedQuery = this.normalizeText(query);
                
                // Buscar en técnicas
                for (const [name, technique] of Object.entries(this.knowledgeBase.techniques)) {
                    const similarity = this.fuzzyMatch(normalizedQuery, this.normalizeText(name));
                    if (similarity > 0.7) {
                        let response = `¡Osu! Te refieres a la técnica **${name}**.\n\n`;
                        response += `**Descripción:** ${technique.descripcion}\n`;
                        response += `**Uso:** ${technique.uso}\n`;
                        response += `**Cinturón:** ${technique.cinturon}\n`;
                        response += `**Categoría:** ${technique.category}`;
                        
                        // Sugerencia pedagógica si es técnica avanzada
                        if (technique.cinturon.includes('Dan') || technique.cinturon.includes('5 kyu')) {
                            response += `\n\n**Sugerencia del Sensei:** Esta es una técnica avanzada. Te recomiendo dominar primero las técnicas básicas de 10° Kyu como Oi Zuki y Mae Geri.`;
                        }
                        
                        return response;
                    }
                }
                
                // Buscar en vocabulario
                for (const [term, definition] of Object.entries(this.knowledgeBase.vocabulary)) {
                    const similarity = this.fuzzyMatch(normalizedQuery, this.normalizeText(term));
                    if (similarity > 0.7) {
                        return `¡Osu! **${term.toUpperCase()}**\n\n${definition}`;
                    }
                }
                
                // Buscar en historia
                for (const [topic, info] of Object.entries(this.knowledgeBase.history)) {
                    const similarity = this.fuzzyMatch(normalizedQuery, this.normalizeText(topic));
                    if (similarity > 0.7) {
                        return `¡Osu! **${topic.toUpperCase()}**\n\n${info}`;
                    }
                }
                
                // Respuesta por defecto
                return this.knowledgeBase.general.error + "\n\nIntenta preguntar sobre:\n• Técnicas (Oi Zuki, Mae Geri, Gedan Barai)\n• Vocabulario (dojo, sensei, oss)\n• Historia del karate";
            }
        }

        // Inicializar el sistema
        const sensei = new SenseiAI();
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${isUser ? 'user-message' : 'sensei-message'}`;
            
            // Procesar markdown simple
            const formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = formattedContent;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Agregar mensaje del usuario
            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;

            // Mostrar indicador de escritura
            showTypingIndicator();

            // Simular procesamiento y responder
            setTimeout(() => {
                hideTypingIndicator();
                const response = sensei.search(message);
                addMessage(response);
                sendBtn.disabled = false;
                userInput.focus();
            }, 1000 + Math.random() * 1000); // 1-2 segundos de delay
        }

        function sendSuggestion(suggestion) {
            userInput.value = suggestion;
            sendMessage();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus en el input al cargar
        userInput.focus();
    </script>
</body>
</html>
